#
# Performs an AppSec/SAST Aviator audit of the project, after SAST scanning has already taken place. This is an
# exception scenario included for demos; the more common scenario is in scan_audit.yml.
#
name: Audit-Only

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v3
        with:
          fcli: latest

      - name: aviator session login
        run: fcli aviator session login --url ${{vars.AVIATOR_URL}} --token "string:${{secrets.AVIATOR_TOKEN}}"
      - name: SSC session login
        run: fcli ssc session login --url ${{vars.SSC_URL}} --token "${{secrets.SSC_TOKEN}}"
      - name: Run SAST Aviator audit
        run: fcli aviator ssc audit --av "${{vars.APPLICATION_NAME}}:${{github.ref_name}}" --app "${{vars.APPLICATION_NAME}}" --progress=none