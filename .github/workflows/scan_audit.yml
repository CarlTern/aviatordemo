#
# Runs an OpenText SAST (Fortify) scan using Scan Central, using fortify/github-action@v3.
# Also performs auditing using AppSec/SAST Aviator, showing how this has been done by merely
# adding some options to the fortify/github-action@v3 invocation.
#

name: Scan-Audit

on:
  workflow_dispatch:

jobs:
  scan_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run ScanCentral SAST
        uses: fortify/github-action@v3
        env:
          SSC_URL: ${{vars.SSC_URL}}
          SC_CLIENT_VERSION: 25.4          
          SSC_TOKEN: ${{secrets.SSC_TOKEN}}
          SC_SAST_TOKEN: ${{secrets.SC_SAST_CLIENT_AUTH_TOKEN}}
          SSC_APPVERSION: "${{vars.APPLICATION_NAME}}:${{github.ref_name}}"
          AVIATOR_URL: ${{vars.AVIATOR_URL}}
          AVIATOR_APP: "${{vars.APPLICATION_NAME}}"
          AVIATOR_TOKEN: ${{secrets.AVIATOR_TOKEN}}
          DO_SETUP: true
          DO_WAIT: true
          DO_JOB_SUMMARY: true
